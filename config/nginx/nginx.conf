events { worker_connections 1024; }

http {
    # Define the pool of application servers to load balance across
    upstream fastapi_cluster {
        # Round Robin is the default algorithm used here
        server app-server-1:8000;
        server app-server-2:8000;
        server app-server-secret:8000 backup;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://fastapi_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_connect_timeout 1s;
            proxy_send_timeout 3s;
            proxy_read_timeout 3s;
        }
    }
}